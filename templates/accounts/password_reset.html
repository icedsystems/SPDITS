{% extends 'base.html' %}
{% block title %}Forgot Password — ICED SPDITS{% endblock %}

{% block unauthenticated_content %}
<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5 col-lg-4">
        <div class="login-card card shadow-lg">
          <div class="card-body p-0">
            <div class="text-center p-4 pb-3" style="background: linear-gradient(135deg,#1a2840 0%,#1a3a6b 100%);">
              <img src="/static/img/logo.png" alt="ICED" height="55" class="mb-3">
              <h5 class="text-white fw-bold mb-0">Reset Password</h5>
              <p class="text-white-50 small mb-0">ICED SPDITS</p>
            </div>
            <div class="p-4">
              <p class="text-muted small mb-3">Enter your email address and we will send you a link to reset your password.</p>
              <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-4">
                  <label class="form-label fw-semibold small">Email Address</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold">
                  <i class="bi bi-send me-2"></i>Send Reset Link
                </button>
              </form>
              <div class="text-center mt-3">
                <a href="{% url 'accounts:login' %}" class="small text-muted">← Back to Login</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
