{% extends 'base.html' %}
{% block title %}Password Reset Complete — ICED SPDITS{% endblock %}

{% block unauthenticated_content %}
<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5 col-lg-4">
        <div class="login-card card shadow-lg">
          <div class="card-body p-0">
            <div class="text-center p-4 pb-3" style="background: linear-gradient(135deg,#1a2840 0%,#1a3a6b 100%);">
              <img src="/static/img/logo.png" alt="ICED" height="55" class="mb-3">
              <h5 class="text-white fw-bold mb-0">Password Updated</h5>
              <p class="text-white-50 small mb-0">ICED SPDITS</p>
            </div>
            <div class="p-4 text-center">
              <i class="bi bi-shield-check display-4 text-success d-block mb-3"></i>
              <p class="fw-semibold mb-1">Your password has been set successfully.</p>
              <p class="text-muted small">You can now log in with your new password.</p>
              <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Go to Login
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
