{% extends 'base.html' %}
{% block title %}Invalid Invitation — ICED SPDITS{% endblock %}
{% block unauthenticated_content %}
<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 text-center">
        <div class="card shadow-lg p-5">
          <i class="bi bi-x-circle-fill text-danger" style="font-size:4rem"></i>
          <h4 class="fw-bold mt-3">Invitation Invalid</h4>
          <p class="text-muted">This invitation link has expired, been revoked, or already been used.</p>
          <a href="{% url 'accounts:login' %}" class="btn btn-primary">Go to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
